<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>adblock</title>
</head>
<body>
    <div class="alert_block">
        <img src="img/safari.png" alt="safari_logo" class="logo">
        <div class="close_btn">&#10006;</div>
        <h1 class="title">Install the ad-blocking app?</h1>
        <p class="text">To ensure ad-free and <br>
            stable use of Safari, it is recommended to install an ad-blocking app. Please go to the App Store, download the app, and then install it for an optimal user experience.</p>
        <div class="btns">
            <a href="" class="cancel_btn">Cancel</a>
            <a href="" class="install_btn">Install</a>
        </div>
    </div>
</body>
</html>
